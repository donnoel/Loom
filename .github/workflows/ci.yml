name: Loom CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: macos-15
    env:
      DERIVED_DATA: ${{ github.workspace }}/DerivedData
      RESULT_BUNDLE: ${{ github.workspace }}/TestResults/Loom.xcresult
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/Developer/Xcode/DerivedData/ModuleCache.noindex
          key: spm-${{ runner.os }}-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Resolve packages
        run: xcodebuild -resolvePackageDependencies -project Loom.xcodeproj

      - name: Build for testing (macOS)
        run: |
          set -eo pipefail
          xcodebuild \
            -project Loom.xcodeproj \
            -scheme Loom \
            -configuration Debug \
            -destination "platform=macOS,arch=arm64" \
            -derivedDataPath "$DERIVED_DATA" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            clean build-for-testing

      - name: Build and test
        run: |
          set -eo pipefail
          xcodebuild \
            -project Loom.xcodeproj \
            -scheme Loom \
            -configuration Debug \
            -destination "platform=macOS,arch=arm64" \
            -derivedDataPath "$DERIVED_DATA" \
            -resultBundlePath "$RESULT_BUNDLE" \
            -only-testing:LoomTests \
            -skip-testing:LoomTests/StatusViewModelCoverageTests \
            -skip-testing:LoomTests/SessionMessagesViewModelCoverageTests \
            -parallel-testing-enabled NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            test-without-building

      - name: Upload xcodebuild logs (if the job fails)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-artifacts
          path: |
            ${{ env.RESULT_BUNDLE }}
            ${{ env.DERIVED_DATA }}/Logs/Test
